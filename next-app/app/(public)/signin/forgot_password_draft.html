<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Forgot Password</title>
</head>

<!--Forgot Password Info
- Input Password
- Send Sign-In Code via email
- Remember me button
- Required fields before Sign In button
- Incorrect email
- if correct password -> dashboard, if incorrect password -> prompt again (3 retries)
- Prompt forgot password after 3 tries
--> 

<body>

  <!-- LEFT PANEL: slideshow background + brand + caption + dots -->
  <div class="left-panel">

    <!-- The four slide images. JavaScript will toggle the
         "active" and "leaving" classes to show/hide them. -->
    <img class="slide-img" id="slide-0" src="images/slide0.jpg" alt="slide0" />
    <img class="slide-img" id="slide-1" src="images/slide1.jpg" alt="slide1"/>
    <img class="slide-img" id="slide-2" src="images/slide2.jpg" alt="slide2" />
    <img class="slide-img" id="slide-3" src="images/slide3.jpg" alt="slide3" />

    <!-- Dark gradient layer over the photos -->
    <div class="overlay"></div>

    <!-- Edge-darkening vignette -->
    <div class="vignette"></div>

    <!-- Brand name top-left -->
    <span class="brand">Safari Smart</span>

    <!-- Caption, headline, and dot indicators bottom-left -->
    <div class="bottom-content">
      <p class="slide-caption" id="caption">Taking small steps towards a bright future </p>
      <h1 class="tagline">
        Welcome back!<br>
        <span class="tagline-accent">Let's get you signed in.</span>
      </h1>
      <!-- Dots are built by JavaScript so they match the number of slides -->
      <div class="dots" id="dots"></div>
    </div>

  </div>

  <!-- RIGHT PANEL: the sign-in form -->
  <div class="right-panel">

    <h2 class="form-heading">Recover Account</h2>
    <p class="form-sub">Enter your email address.</p>
    <div class="accent-bar"></div>

    <!-- The form. onsubmit calls handleSubmit() defined in JavaScript below. -->
    <form id="signin-form" onsubmit="handleSubmit(event)">

      <div class="field-group">
        <label class="field-label" for="email">Email Address</label>
        <input class="field-input" id="email" type="email"
               placeholder="johndoe@example.com" required autocomplete="email" />
      </div>

      <button class="submit-btn" id="submit-btn" type="submit">Send Sign-In Code</button>

    </form>
  </div>

</body>
</html>
