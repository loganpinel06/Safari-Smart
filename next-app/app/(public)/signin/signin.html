<!DOCTYPE html>
<html lang="en">

<!--CSS SECTION -->
<style>
  /* Keyframe Animations 
     @keyframes defines a reusable animation by describing what
     the element looks like at the start (from) and end (to).
     We give each animation a name so CSS can reference it later. */

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes fadeOut {
    from { opacity: 1; }
    to   { opacity: 0; }
  }

  /* Ken Burns: slowly zoom + pan each photo.
     Each slide gets its own keyframe. */
  @keyframes kb-0 {
    from { transform: scale(1.08) translate(0%, 0%);  }
    to   { transform: scale(1.18) translate(0%, 0%);  }
  }
  @keyframes kb-1 {
    from { transform: scale(1.08) translate(0%, 0%);  }
    to   { transform: scale(1.18) translate(0%, 0%);  }
  }
  @keyframes kb-2 {
    from { transform: scale(1.08) translate(0%, 0%);  }
    to   { transform: scale(1.18) translate(0%, 0%);  }
  }
  @keyframes kb-3 {
    from { transform: scale(1.08) translate(0%, 0%);  }
    to   { transform: scale(1.18) translate(0%, 0%);  }
  }

  /* Reset - start with a standard format each time */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  /* Page Root - Background
     display:flex puts the two panels side by side (left + right).
     min-height:100vh makes the page fill the full screen height.
     overflow: scroll bar visibility */
  body {
    display: flex;
    min-height: 100vh;
    font-family: 'Inter', serif;
    background: #FFF1B8;
    color: #592803;
    overflow: hidden;
  }

  /* Left Panel 
     flex:1 makes it stretch to fill all remaining space.
     position:relative is required so that the absolutely
     positioned children (images, overlays, text) are placed
     relative to this panel, not the whole page.
     overflow:hidden clips the zooming images to the panel edges. */
  .left-panel {
    flex: 1;
    position: relative;
    display: flex;
    align-items: flex-end; /* push bottom-content to the bottom */
    padding: 3rem;
    overflow: hidden;
  }

  /* Slide Images 
     All images are stacked in the exact same spot (position:absolute,
     inset:0 = top/right/bottom/left all 0). Only the active one is
     visible. object-fit:cover fills the space without stretching. */
  .slide-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;        
    z-index: -1;
    will-change: transform, opacity; /* tells browser to GPU-accelerate */
  }

  /* The active slide fades in and plays its Ken Burns animation.
     JavaScript adds/removes this class to control which is visible. */
  .slide-img.active {
    opacity: 1;
    z-index: 1;
  }

  /* The outgoing slide plays a fade-out before disappearing. */
  .slide-img.leaving {
    z-index: 0;
    animation: fadeOut 2000ms ease-in-out forwards;
  }

  /* Dark Gradient Overlay - transparent at the top, dark at the bottom for readability */
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.1) 0%,
      rgba(0,0,0,0.72) 100%
    );
    z-index: 2;
  }

  /* Vignette - darkens edges */
  .vignette {
    position: absolute;
    inset: 0;
    box-shadow: inset 0 0 140px rgba(0,0,0,0.55);
    z-index: 3;
  }

  /* Brand Name - top-left corner, above all overlay layers */
  .brand {
    position: absolute;
    top: 2.5rem;
    left: 3rem;
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #FFF1B8;
    z-index: 4;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }

  /* Bottom Content (caption + headline + dots)*/
  .bottom-content {
    position: relative;
    z-index: 4; /*keeps it above the overlay layers. */
  }

  .slide-caption {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,241,184,0.7);
    margin-bottom: 0.75rem;
    text-shadow: 0 1px 8px rgba(0,0,0,0.5);
  }

  .tagline {
    font-size: clamp(1.8rem, 3.5vw, 3rem); /* scales with screen width */
    font-weight: 400;
    line-height: 1.15;
    color: #FFF1B8;
    margin-bottom: 1.5rem;
    text-shadow: 0 2px 18px rgba(0,0,0,0.5);
  }

  .tagline-accent {
    color: #FFBA49;
    font-style: italic;
  }

  /* Dot Indicators */
  .dots {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  .dot {
    height: 8px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    padding: 0;
    transition: width 0.4s ease, background 0.3s ease;
  }

  /* Right Panel 
     Fixed width column. Flexbox centers the form vertically.
     overflow-y:auto allows scrolling on short screens. */
  .right-panel {
    flex: 0 0 400px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 4rem 3rem;
    background: #FFF1E5;
    border-left: 1px solid rgba(89,40,3,0.15);
    overflow-y: auto;
  }

  /* Form Typography */
  .form-heading {
    font-size: 1.9rem;
    font-weight: 400;
    margin-bottom: 0.4rem;
    letter-spacing: -0.02em;
    color: #592803;
  }

  .form-sub {
    font-size: 0.85rem;
    color: rgba(89,40,3,0.55);
    margin-bottom: 1.6rem;
  }

  .accent-bar {
    width: 305px;
    height: 2px;
    background: #C7601A;
    border-radius: 1px;
    margin-bottom: 2.2rem;
  }

  /* Form Fields */
  .field-group {
    margin-bottom: 1.3rem;
  }

  .field-label {
    display: block;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(89,40,3,0.6);
    margin-bottom: 0.5rem;
  }

  .field-input {
    width: 100%;
    padding: 0.82rem 1rem;
    background: rgba(89,40,3,0.05);
    border: 1px solid rgba(89,40,3,0.2);
    border-radius: 6px;
    color: #592803;
    font-size: 0.95rem;
    font-family: 'Inter', serif;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  /* :focus activates when the user clicks into the input */
  .field-input:focus {
    border-color: rgba(199,96,26,0.6);
    background: rgba(89,40,3,0.08);
  }

  /* Forgot Password Link */
  .forgot-link {
    display: block;
    text-align: right;
    font-size: 0.78rem;
    color: #C7601A;
    cursor: pointer;
    margin-top: -0.6rem;
    margin-bottom: 1.5rem;
    text-decoration: none;
  }

  /* Submit Button*/
  .submit-btn {
    width: 100%;
    padding: 0.88rem;
    background: #6AC700;
    color: #FFF1B8;
    border: none;
    border-radius: 6px;
    font-size: 0.82rem;
    font-family: 'Inter', serif;
    font-weight: 700;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-bottom: 1.8rem;
  }

  .submit-btn:hover  { background: #592803; }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; }

  /* OR Divider Row */
  .or-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.3rem;
  }

  .or-line { flex: 1; height: 1px; background: rgba(89,40,3,0.15); }
  .or-text  { font-size: 0.7rem; letter-spacing: 0.1em; color: rgba(89,40,3,0.4); }

  /* OAuth Buttons */
  .oauth-btn {
    width: 100%;
    padding: 0.78rem;
    background: transparent;
    border: 1px solid rgba(89,40,3,0.2);
    border-radius: 6px;
    color: rgba(89,40,3,0.7);
    font-size: 0.85rem;
    font-family: 'Inter', serif;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    margin-bottom: 0.7rem;
  }

  .oauth-btn:hover {
    border-color: rgba(89,40,3,0.5);
    color: #592803;
  }

  /* Sign-up Row */
  .signup-row {
    margin-top: 1.8rem;
    font-size: 0.82rem;
    color: rgba(89,40,3,0.5);
    text-align: center;
  }

  .signup-link {
    color: #C7601A;
    cursor: pointer;
    margin-left: 0.3rem;
    text-decoration: none;
  }

</style>

<!--HTML SECTION -->
<body>
  <!-- LEFT PANEL: slideshow background + brand + caption + dots -->
  <div class="left-panel">

    <!-- Slide images - JavaScript will control their activity -->
    <img class="slide-img" id="slide-0" src="images/slide0.jpg" alt="slide0" />
    <img class="slide-img" id="slide-1" src="images/slide1.jpg" alt="slide1" />
    <img class="slide-img" id="slide-2" src="images/slide2.jpg" alt="slide2" />
    <img class="slide-img" id="slide-3" src="images/slide3.jpg" alt="slide3" />

    <!-- Dark overlay -->
    <div class="overlay"></div>

    <!-- Vignette -->
    <div class="vignette"></div>

    <!-- Brand name at top-left -->
    <div class="brand">
    <span class="brand-name">SAFARI SMART</span>
    </div>

    <!-- Caption, headline, and dot indicators at bottom-left -->
    <div class="bottom-content">
      <p class="slide-caption" id="caption">Taking small steps towards a bright future </p>
      <h1 class="tagline">
        Welcome back!<br>
        <span class="tagline-accent">Let's get you signed in.</span>
      </h1>
      <!-- Dots - for later implementation in Javascript -->
      <div class="dots" id="dots"></div>
    </div>
  </div>

  <!-- RIGHT PANEL: Sign-In Form -->
  <div class="right-panel">

    <h2 class="form-heading">Sign In</h2>
    <p class="form-sub">Enter your credentials to access your account.</p>
    <div class="accent-bar"></div>

    <!-- Sign-in executed in Javascript -->
    <form id="signin-form" onsubmit="handleSubmit(event)">

      <div class="field-group">
        <label class="field-label" for="email">Email Address</label>
        <input class="field-input" id="email" type="email"
               placeholder="johndoe@example.com" required autocomplete="email" />
      </div>

      <div class="field-group">
        <label class="field-label" for="password">Password</label>
        <input class="field-input" id="password" type="password"
               placeholder="••••••••" required autocomplete="current-password" />
      </div>

      <a class="forgot-link" href="#">Forgot Password?</a>

      <button class="submit-btn" id="submit-btn" type="submit">Sign In</button>

    </form>

    <div class="or-row">
      <div class="or-line"></div>
      <span class="or-text">or continue with</span>
      <div class="or-line"></div>
    </div>

    <button class="oauth-btn">Google</button>

    <p class="signup-row">
      Don't have an account?
      <a class="signup-link" href="#">Sign Up</a>
    </p>

  </div>
</body>

<!-- JAVASCRIPT SECTION -->
<script>
  // SLIDES
  // Slide Information - array to keep track of captions and Ken Burns keyframe
  const SLIDES = [
    { caption: "Expand your horizon",   animation: "kb-0" },
    { caption: "A new way of learning awaits", animation: "kb-1" },
    { caption: "One step closer to your goals", animation: "kb-2" },
    { caption: "The world at your fingertips", animation: "kb-3" },
  ];

  const SLIDE_DURATION = 6000; // ms timing for slide changes

  // Slide State Variables - tracks state of the slides on the page
  let currentSlide = 0;   
  let prevSlide    = null; 

  // Make HTML elements interactive
  // document.getElementById() finds an HTML element by its id=...
  const captionEl  = document.getElementById("caption");
  const dotsEl     = document.getElementById("dots");
  const submitBtn  = document.getElementById("submit-btn");

  // querySelectorAll returns a list of every element matching the selector
  const slideImgs  = document.querySelectorAll(".slide-img");

  // Build Dot Indicators - create dots for each slide
  SLIDES.forEach((_, i) => {
    const dot = document.createElement("button"); // make a new <button>
    dot.className = "dot";
    dot.setAttribute("aria-label", "Slide " + (i + 1));
    dot.addEventListener("click", () => goToSlide(i)); // clicking jumps to slide i
    dotsEl.appendChild(dot); // add the dot into the HTML
  });

  // Update the UI for each slide transition
  function updateSlide() {
    slideImgs.forEach((img, i) => {
      // Resetting the state for each transition
      img.classList.remove("active", "leaving");
      img.style.animation = "none"; 

      if (i === currentSlide) {
        // Reflow triggering - forces browser to reset the animation for each slide
        void img.offsetWidth;
        img.classList.add("active");
        img.style.animation =
          SLIDES[i].animation + " " + SLIDE_DURATION + "ms ease-in-out forwards, " +
          "fadeIn 2000ms ease-in-out forwards";

      } else if (i === prevSlide) {
        img.classList.add("leaving");
        img.style.animation = "fadeOut 2000ms ease-in-out forwards";
      }
    });

    // Update caption text
    captionEl.textContent = SLIDES[currentSlide].caption;

    // Update dots: wide/bright for active, small/dim for others
    const dots = dotsEl.querySelectorAll(".dot");
    dots.forEach((dot, i) => {
      dot.style.width      = i === currentSlide ? "28px" : "8px";
      dot.style.background = i === currentSlide
        ? "#6AC700"
        : "rgba(255,255,255,0.35)";
    });
  }

  // Slide Navigation - dots can be clicked on for navigation
  function goToSlide(index) {
    if (index === currentSlide) return; // already on this slide, do nothing
    prevSlide    = currentSlide;
    currentSlide = index;
    updateSlide();
  }

  // Timed Slides Implementation - wrapping slides for display
  setInterval(() => {
    prevSlide    = currentSlide;
    currentSlide = (currentSlide + 1) % SLIDES.length;
    updateSlide();
  }, SLIDE_DURATION);

  // Initialise the first slide 
  updateSlide();

  // SIGN IN FORM
  // Form Submission - functionality for "Sign in" button
  // event.preventDefault() stops the browser from reloading the page.
  function handleSubmit(event) {
    event.preventDefault();

    // Read the values the user typed
    const email    = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    // Show loading state on the button
    submitBtn.disabled    = true;
    submitBtn.textContent = "Signing in…";
  }
</script>
